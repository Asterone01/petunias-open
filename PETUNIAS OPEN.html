<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

  /* Inputs — pill with inset tactile border */
  .inp {

  textarea.inp { border-radius: 10px; padding: 12px 16px; }

  /* Slider */

    width: 14px; height: 14px;
    border-radius: 50%;
    background: #00ff97;
    cursor: pointer;
    border: none;
  }

  /* Primary green pill — CTA (functional use only) */

    letter-spacing: 1.4px;

  .btn-neon:active { transform: scale(0.97); }

  /* Outlined pill — secondary */
  .btn-outline {
    padding: 10px 28px;
    background: transparent;
    color: #fff;
    border: 1px solid #7c7c7c;
    border-radius: var(--radius-pill);

    font-size: 12px;

  .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); transform: scale(1.03); }

  /* Category pills (filters) */

    padding: 7px 16px;

    background: var(--surface-2);

    border-radius: var(--radius-pill);

  /* Nav tabs — pill */

  /* Status indicator for Supabase connection */

<script>
/**
 * SUPABASE CONFIGURATION
 * ======================
 * * IMPORTANTE: Configura estas políticas RLS en tu dashboard de Supabase:
 * * 1. Ve a Authentication → Policies
 * 2. Crea políticas para la tabla 'players':
 * - INSERT: Enable insert for all users (anon) o con autenticación
 * - SELECT: Enable select for all users
 * - UPDATE: Enable update for authenticated users only
 * - DELETE: Enable delete for authenticated users only
 * * Ejemplo de política INSERT (para desarrollo):
 * CREATE POLICY "Allow anonymous inserts" ON players
 * FOR INSERT TO anon WITH CHECK (true);
 * * CREATE POLICY "Allow anonymous select" ON players
 * FOR SELECT TO anon USING (true);
 */

// Configuración de Supabase
const SUPABASE_URL = "https://ssrfkclvzvjzipunpalh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzcmZrY2x2enZqemlwdW5wYWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTI5NDksImV4cCI6MjA5MjM2ODk0OX0.JibvsRZB7hhfungMorwVF8Zom7_sudlVXTksAVQLsOo";

// Variable global para el cliente
let db = null;
let dbStatus = 'offline';

// Inicializar cliente Supabase de forma segura
function initSupabase() {
  try {
    if (typeof supabase === 'undefined' || !supabase.createClient) {
      console.warn('Supabase library not loaded yet');
      return false;
    }
    
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: false
      },
      db: {
        schema: 'public'
      }
    });
    
    console.log("✅ Supabase client initialized");
    return true;
  } catch (err) {
    console.error("❌ Failed to initialize Supabase:", err);
    db = null;
    return false;
  }
}

// Verificar conexión con Supabase
async function checkSupabaseConnection() {
  if (!db) {
    updateDbStatus('offline', '● No DB');
    return false;
  }
  
  try {
    const { data, error } = await db.from('players').select('count').limit(1);
    
    if (error) {
      console.warn("⚠️ Supabase connection check failed:", error.message);
      updateDbStatus('offline', '● Error');
      return false;
    }
    
    console.log("✅ Supabase connected successfully");
    updateDbStatus('online', '● Online');
    return true;
  } catch (err) {
    console.error("❌ Supabase connection error:", err);
    updateDbStatus('offline', '● Error');
    return false;
  }
}

// Actualizar indicador visual
function updateDbStatus(status, text) {
  dbStatus = status;
  const el = document.getElementById('db-status');
  if (!el) return;
  
  el.style.display = 'block';
  el.className = `db-status ${status}`;
  el.textContent = text;
}

// ==================== DATABASE OPERATIONS ====================

// Obtener jugadores desde Supabase o localStorage
async function getPlayers() {
  // Intentar Supabase primero
  if (db && dbStatus === 'online') {
    try {
      const { data, error } = await db
        .from('players')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (error) throw error;
      
      if (data && data.length > 0) {
        console.log(`📥 Loaded ${data.length} players from Supabase`);
        // Sincronizar con localStorage
        localStorage.setItem('petunias-players', JSON.stringify(data));
        return data.map(ensurePlayerRating);
      }
    } catch (err) {
      console.warn("⚠️ Failed to load from Supabase, falling back to localStorage:", err.message);
    }
  }
  
  // Fallback a localStorage
  try {
    const raw = JSON.parse(localStorage.getItem('petunias-players')) || [];
    console.log(`📦 Loaded ${raw.length} players from localStorage`);
    return raw.map(ensurePlayerRating);
  } catch {
    return [];
  }
}

// Guardar jugador en Supabase y localStorage
async function savePlayer(player) {
  const playerWithRating = ensurePlayerRating({
    ...player,
    id: player.id || Date.now(),
    created_at: new Date().toISOString()
  });
  
  // Siempre guardar en localStorage primero (garantiza persistencia)
  const existing = JSON.parse(localStorage.getItem('petunias-players')) || [];
  const updated = [playerWithRating, ...existing];
  localStorage.setItem('petunias-players', JSON.stringify(updated));
  
  // Intentar sincronizar con Supabase
  if (db && dbStatus === 'online') {
    try {
      updateDbStatus('syncing', '⟳ Syncing...');
      
      const { data, error } = await db
        .from('players')
        .insert([{
          id: playerWithRating.id,
          name: playerWithRating.nombre || playerWithRating.name,
          age: playerWithRating.edad || playerWithRating.age || 0,
          gender: playerWithRating.genero || playerWithRating.gender || 'M',
          category: playerWithRating.categoria || 'C',
          rating: playerWithRating.rating || 1500,
          wins: playerWithRating.wins || 0,
          losses: playerWithRating.losses || 0,
          history: JSON.stringify(playerWithRating.history || []),
          created_at: playerWithRating.created_at
        }])
        .select();
      
      if (error) throw error;
      
      console.log("✅ Player saved to Supabase:", data);
      updateDbStatus('online', '● Online');
      return { success: true, data: data?.[0] || playerWithRating, source: 'supabase' };
    } catch (err) {
      console.warn("⚠️ Failed to save to Supabase, saved locally:", err.message);
      updateDbStatus('offline', '● Local Only');
      return { success: true, data: playerWithRating, source: 'local' };
    }
  }
  
  return { success: true, data: playerWithRating, source: 'local' };
}

// Eliminar jugador
async function deletePlayerFromDB(id) {
  // Eliminar de localStorage
  const existing = JSON.parse(localStorage.getItem('petunias-players')) || [];
  const updated = existing.filter(p => p.id !== id);
  localStorage.setItem('petunias-players', JSON.stringify(updated));
  
  // Intentar eliminar de Supabase
  if (db && dbStatus === 'online') {
    try {
      const { error } = await db.from('players').delete().eq('id', id);
      if (error) throw error;
      console.log("✅ Player deleted from Supabase");
    } catch (err) {
      console.warn("⚠️ Failed to delete from Supabase:", err.message);
    }
  }
  
  return { success: true };
}

// Sincronizar todos los datos locales con Supabase
async function syncWithSupabase() {
  if (!db || dbStatus !== 'online') {
    console.log("⏸️ Cannot sync: Supabase not available");
    return { synced: 0, failed: 0 };
  }
  
  const localPlayers = JSON.parse(localStorage.getItem('petunias-players')) || [];
  if (localPlayers.length === 0) return { synced: 0, failed: 0 };
  
  updateDbStatus('syncing', '⟳ Syncing...');
  let synced = 0;
  let failed = 0;
  
  for (const player of localPlayers) {
    try {
      const { error } = await db
        .from('players')
        .upsert({
          id: player.id,
          name: player.nombre || player.name,
          age: player.edad || player.age || 0,
          gender: player.genero || player.gender || 'M',
          category: player.categoria || 'C',
          rating: player.rating || 1500,
          wins: player.wins || 0,
          losses: player.losses || 0,
          history: JSON.stringify(player.history || []),
          created_at: player.created_at || new Date().toISOString()
        }, { onConflict: 'id' });
      
      if (error) throw error;
      synced++;
    } catch (err) {
      console.warn(`Failed to sync player ${player.id}:`, err.message);
      failed++;
    }
  }
  
  updateDbStatus('online', '● Online');
  console.log(`🔄 Sync complete: ${synced} synced, ${failed} failed`);
  return { synced, failed };
}

// Verificar conexión con Supabase e iniciar el Tiempo Real
async function checkSupabaseConnection() {
  if (!db) {
    updateDbStatus('offline', '● No DB');
    return false;
  }
  
  try {
    const { data, error } = await db.from('players').select('count').limit(1);
    
    if (error) {
      console.warn("⚠️ Supabase connection check failed:", error.message);
      updateDbStatus('offline', '● Error');
      return false;
    }
    
    console.log("✅ Supabase connected successfully");
    updateDbStatus('online', '● Online');
    
    // INICIAMOS LA ESCUCHA EN TIEMPO REAL
    subscribeToRealtime();
    
    return true;
  } catch (err) {
    console.error("❌ Supabase connection error:", err);
    updateDbStatus('offline', '● Error');
    return false;
  }
}

// NUEVA FUNCIÓN: Escuchar cambios en la base de datos en Tiempo Real
function subscribeToRealtime() {
  if (!db) return;

  console.log("📡 Suscribiendo a cambios en tiempo real...");
  
  // Creamos un canal para escuchar la tabla 'players'
  const playersChannel = db.channel('public:players')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, payload => {
      console.log('¡Cambio detectado en Supabase!', payload);
      
      // Cuando hay un cambio, volvemos a descargar los datos silenciosamente
      getPlayers().then(updatedPlayers => {
        // Disparamos un evento personalizado para que React se entere y actualice la pantalla
        const event = new CustomEvent('supabase-players-updated', { detail: updatedPlayers });
        window.dispatchEvent(event);
      });
    })
    .subscribe();
}

// Actualizar indicador visual
function updateDbStatus(status, text) {
  window.dbStatus = status; // Aseguramos que sea global
  const el = document.getElementById('db-status');
  if (!el) return;
  
  el.style.display = 'block';
  el.className = `db-status ${status}`;
  el.textContent = text;
}

// Inicializar cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', async function() {
  // Intentar inicializar Supabase
  const initialized = initSupabase();
  
  if (initialized) {
    // Verificar conexión (esto ahora también inicia el tiempo real)
    await checkSupabaseConnection();
    
    // Reintentar conexión cada 30 segundos si está offline
    setInterval(async () => {
      if (window.dbStatus === 'offline') {
        await checkSupabaseConnection();
      }
    }, 30000);
  } else {
    updateDbStatus('offline', '● No DB');
  }
});
</script>

// Push an auto-generated post into NewsSection feed (petunias-news)
function pushNewsPost({ titulo, tipo, contenido, auto }) {
  try {
    const news = JSON.parse(localStorage.getItem('petunias-news')) || [];
    news.unshift({
      id: Date.now() + Math.random(),
      titulo, tipo, contenido,
      fecha: new Date().toISOString().slice(0,10),
      autorNombre: auto ? 'Sistema' : 'Admin',
      imagen: null, destacado: false, comments: [],
      auto: !!auto,
    });
    localStorage.setItem('petunias-news', JSON.stringify(news));
  } catch (e) { /* ignore */ }
}

function App() {
  const [showWelcome, setShowWelcome] = React.useState(() => !sessionStorage.getItem('po-welcome'));
  const [tab, setTab] = React.useState(() => localStorage.getItem('po-tab') || TABS.DASHBOARD);
  const [players, setPlayers] = React.useState([]);
  const [playersLoaded, setPlayersLoaded] = React.useState(false);
  const [matches, setMatches] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('petunias-matches')) || []; } catch { return []; }
  });
  const [tournaments, setTournaments] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('petunias-tournaments')) || []; } catch { return []; }
  });
  const [currentUser, setCurrentUser] = React.useState(() => getSession());
  const [showAuth, setShowAuth] = React.useState(false);
  const [showProfile, setShowProfile] = React.useState(false);
  const [showAdmin, setShowAdmin] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [dbConnectionStatus, setDbConnectionStatus] = React.useState('checking');
  const [userRole, setUserRole] = React.useState('admin'); // 'admin' | 'player'

  // Cargar jugadores al iniciar
 React.useEffect(() => {
    async function loadPlayers() {
      try {
        const loaded = await window.getPlayers();
        setPlayers(loaded);
        setPlayersLoaded(true);
        setDbConnectionStatus(window.dbStatus);
      } catch (err) {
        console.error("Failed to load players:", err);
        setPlayers([]);
        setPlayersLoaded(true);
      }
    }
    
    // Carga inicial
    loadPlayers();

    // ESCUCHADOR DE TIEMPO REAL: Se activa cuando Supabase detecta un cambio
    const handleRealtimeUpdate = (event) => {
      console.log("🔄 React actualizando vista con nuevos datos de Supabase...");
      setPlayers(event.detail);
    };

    window.addEventListener('supabase-players-updated', handleRealtimeUpdate);

    // Limpieza al desmontar
    return () => {
      window.removeEventListener('supabase-players-updated', handleRealtimeUpdate);
    };
  }, []);

  React.useEffect(() => { localStorage.setItem('petunias-tournaments', JSON.stringify(tournaments)); }, [tournaments]);
  React.useEffect(() => { localStorage.setItem('petunias-matches', JSON.stringify(matches)); }, [matches]);
  React.useEffect(() => { localStorage.setItem('po-tab', tab); }, [tab]);

  const handleEnterApp = () => {
    sessionStorage.setItem('po-welcome', '1');
    setShowWelcome(false);
  };

const handleUpdatePlayerStats = async (updatedPlayer) => {
    setPlayers(prev => prev.map(p => p.id === updatedPlayer.id ? updatedPlayer : p));
    const existing = JSON.parse(localStorage.getItem('petunias-players')) || [];
    const updatedList = existing.map(p => p.id === updatedPlayer.id ? updatedPlayer : p);
    localStorage.setItem('petunias-players', JSON.stringify(updatedList));

    if (window.db && window.dbStatus === 'online') {
      try {
        await window.db.from('players').update({
          name: updatedPlayer.nombre || updatedPlayer.name,
          rating: updatedPlayer.rating,
          wins: updatedPlayer.wins,
          losses: updatedPlayer.losses,
          category: updatedPlayer.categoria
        }).eq('id', updatedPlayer.id);
      } catch (err) {
        console.warn("Error actualizando en Supabase:", err);
      }
    }
    alert(`Estadísticas y atributos de ${updatedPlayer.nombre || updatedPlayer.name} actualizados con éxito.`);
  };

  // Guardar jugador con soporte para Supabase
  const addPlayer = async (player) => {
    const p = ensurePlayerRating({ ...player, id: Date.now() });
    
    // Guardar en Supabase/localStorage
    const result = await savePlayer(p);
    
    if (result.success) {
      // Actualizar estado local
      setPlayers(prev => [result.data, ...prev]);
      
      // Auto-feed: new player
      addAutoFeedEvents([{ type:'nuevo', playerId:p.id, playerName:p.nombre, categoria:p.categoria }]);
      
      // Also push to NewsSection feed as a post
      pushNewsPost({
        titulo: `🎾 Nuevo jugador: ${p.nombre}`,
        tipo: 'noticia',
        contenido: `Se incorpora ${p.nombre} en categoría ${p.categoria} con rating inicial ${p.rating}.`,
        auto: true,
      });
      
      setTab(TABS.GALLERY);
      return result;
    } else {
      alert('Error al guardar el jugador. Intenta de nuevo.');
      return result;
    }
  };
  
  const deletePlayer = async (id) => {
    if (!confirm('¿Eliminar este jugador?')) return;
    
    await deletePlayerFromDB(id);
    setPlayers(prev => prev.filter(p => p.id !== id));
  };

  // ── Match handlers (apply ELO + auto-feed) ─────────────────────────────
  const addMatch = (matchData) => {
    const match = createMatch({ ...matchData, createdBy: currentUser?.id });
    const { players: updatedPlayers, events } = applyMatchToPlayers(players, match);
    // Attach deltas to the match for display
    const pA = players.find(p => p.id === match.playerAId);
    const pB = players.find(p => p.id === match.playerBId);
    const resultEvent = events.find(e => e.type === 'resultado');
    const enrichedMatch = {
      ...match,
      deltaA: resultEvent?.deltaA,
      deltaB: resultEvent?.deltaB,
    };
    setPlayers(updatedPlayers);
    setMatches(prev => [...prev, enrichedMatch]);
    addAutoFeedEvents(events);

    // Post to NewsSection feed
    const winner = updatedPlayers.find(p => p.id === match.winnerId);
    const loser  = updatedPlayers.find(p => p.id !== match.winnerId && (p.id === match.playerAId || p.id === match.playerBId));
    pushNewsPost({
      titulo: `🏆 ${winner.nombre} venció a ${loser.nombre}`,
      tipo: 'resultado',
      contenido: `${match.score ? 'Score: ' + match.score + '. ' : ''}Cambios ELO: ${winner.nombre} ${resultEvent.winnerId === pA.id ? (resultEvent.deltaA >= 0 ? '+' : '') + resultEvent.deltaA : (resultEvent.deltaB >= 0 ? '+' : '') + resultEvent.deltaB}, ${loser.nombre} ${resultEvent.winnerId === pA.id ? (resultEvent.deltaB >= 0 ? '+' : '') + resultEvent.deltaB : (resultEvent.deltaA >= 0 ? '+' : '') + resultEvent.deltaA}.`,
      auto: true,
    });

    // Auto-posts for ascenso/descenso/racha
    events.filter(e => e.type !== 'resultado').forEach(e => {
      if (e.type === 'ascenso') {
        pushNewsPost({ titulo: `⬆ ${e.playerName} sube a categoría ${e.to}`, tipo:'noticia',
          contenido: `Ascenso automático de ${e.from} a ${e.to} tras el último partido.`, auto:true });
      } else if (e.type === 'descenso') {
        pushNewsPost({ titulo: `⬇ ${e.playerName} baja a categoría ${e.to}`, tipo:'noticia',
          contenido: `Descenso automático de ${e.from} a ${e.to} tras el último partido.`, auto:true });
      } else if (e.type === 'racha') {
        pushNewsPost({ titulo: `🔥 ${e.playerName} en racha de ${e.streak} victorias`, tipo:'resultado',
          contenido: `${e.playerName} suma ${e.streak} victorias consecutivas.`, auto:true });
      }
    });
  };

  const deleteMatch = (id) => {
    const match = matches.find(m => m.id === id);
    if (!match) return;
    if (!confirm('¿Eliminar este partido? Se revertirá el cambio de ELO.')) return;
    setPlayers(revertMatchFromPlayers(players, match));
    setMatches(prev => prev.filter(m => m.id !== id));
  };
  const handleLogout = () => { clearSession(); setCurrentUser(null); setShowProfile(false); };
  const handleAuth = (user) => { setCurrentUser(user); setShowAuth(false); };
  const isAdmin = currentUser?.isAdmin;

  const navItems = [
    { key: TABS.DASHBOARD, label: '⌂ Home'                            },
    { key: TABS.NEWS,      label: '◎ Noticias'                        },
    { key: TABS.RANKING,   label: '★ Ranking'                         },
    { key: TABS.MATCHES,   label: `⚔ Partidos (${matches.length})`   },
    { key: TABS.ADD,       label: '+ Jugador',     adminOnly: true     },
    { key: TABS.EDIT_STATS,label: '✎ Editar Stats',adminOnly: true     },
    { key: TABS.GALLERY,   label: `◈ Galería (${players.length})`     },
    { key: TABS.COMPARE,   label: '⇄ Comparar',    disabled: players.length < 2 },
    { key: TABS.TORNEOS,   label: `⬡ Torneos (${tournaments.length})` },
    { key: TABS.HISTORIAL, label: '◉ Historial'                       },
    { key: TABS.TRAININGS,   label: '🎾 Entrenamientos', coachOrAdmin: true },
    { key: TABS.EVALUATIONS, label: '📋 Evaluaciones',   coachOrAdmin: true },
    { key: TABS.MEDALS,      label: '🏅 Medallas'                          },
  ].filter(n => (!n.adminOnly || isAdmin) && (!n.coachOrAdmin || isAdmin || currentUser?.isCoach));

  const goTab = (k) => { setTab(k); setMenuOpen(false); };

  // Función para sincronizar manualmente
  const handleSync = async () => {
    updateDbStatus('syncing', '⟳ Syncing...');
    const result = await syncWithSupabase();
    alert(`Sincronización: ${result.synced} jugadores sincronizados, ${result.failed} fallidos`);
    // Recargar jugadores
    const loaded = await getPlayers();
    setPlayers(loaded);
  };

  if (!playersLoaded) {
    return (
      <div className="min-h-screen flex items-center justify-center flex-col bg-dark-bg">
        <motion.div 
          initial={{ opacity: 0 }} 
          animate={{ opacity: 1 }}
          transition={{ duration: 0.5 }}
          className="flex flex-col items-center justify-center min-h-[50vh]"
        >
          <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand-green"></div>
          <div className="text-text-muted mt-4 tracking-widest text-sm uppercase">Cargando...</div>
        </motion.div>
      </div>
    );
  }

  if (showWelcome) {
    return <WelcomeScreen onEnter={handleEnterApp} />;
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>

      {/* ── Header ── */}
      <motion.header 
        initial={{ y: -100 }} 
        animate={{ y: 0 }} 
        transition={{ duration: 0.5 }}
        className="sticky top-0 z-50 bg-nav-bg/90 backdrop-blur-md py-4 px-6 border-b border-gray-800"
      >
        <div style={{ maxWidth:1200, margin:'0 auto' }}>
          {/* Logo + user row */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
           {/* Logo y Versión */}
            <div style={{ display:'flex', alignItems:'flex-end', gap: 12 }}>
              <button onClick={()=>goTab(TABS.DASHBOARD)}
                title="Ir al dashboard"
                className="bg-transparent border-none p-0 cursor-pointer flex items-center">
                <span className="text-2xl font-bold tracking-tight">
                  <span className="text-white">Petunias</span> <span className="text-brand-green">Open</span>
                </span>
              </button>
              
              {/* Etiqueta de Versión */}
              <span className="bg-brand-green/10 text-brand-green border border-brand-green/30 px-2 py-0.5 rounded text-[9px] font-audiowide uppercase tracking-wider mb-1">
                Pre-Alpha 1.10
              </span>
            </div>
            
            {/* Toggle Role Button (Dev/Test) */}
            <button 
              onClick={() => setUserRole(prev => prev === 'admin' ? 'player' : 'admin')}
              className="bg-brand-green/20 border border-brand-green/40 text-brand-green px-3 py-1 rounded-full text-xs font-audiowide uppercase tracking-wider hover:bg-brand-green/30 transition-colors ml-4"
              title="Alternar vista de Administrador / Jugador"
            >
              Rol: {userRole}
            </button>
            {/* User area */}
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {/* Sync button - visible when online */}
              {dbStatus === 'online' && (
                <button onClick={handleSync}
                  className="hidden md:flex rounded-full px-4 py-2 bg-brand-green/10 border border-brand-green/25 text-brand-green text-[10px] font-audiowide uppercase tracking-widest hover:bg-brand-green/20 transition-colors">
                  🔄 Sync
                </button>
              )}
              
              {isAdmin && (
                <button onClick={()=>setShowAdmin(true)}
                  className="hidden md:flex rounded-full px-4 py-2 bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 text-[10px] font-audiowide uppercase tracking-widest hover:bg-yellow-500/20 transition-colors">⚙ Admin</button>
              )}
              {currentUser ? (
                <button onClick={()=>setShowProfile(true)}
                  className="flex items-center gap-2 px-4 py-2 rounded-full bg-brand-green/10 border border-brand-green/25 hover:bg-brand-green/20 transition-colors">
                  {currentUser.avatar
                    ? <img src={currentUser.avatar} alt="" className="w-5 h-5 rounded-full object-cover" />
                    : <div className="w-5 h-5 rounded-full bg-brand-green/20 flex items-center justify-center text-xs">👤</div>
                  }
                  <span className="text-[11px] text-brand-green font-audiowide uppercase tracking-wider max-w-[80px] truncate">
                    {currentUser.nombre.split(' ')[0]}
                  </span>
                </button>
              ) : (
                <button onClick={()=>setShowAuth(true)} className="rounded-full px-6 py-2.5 font-semibold bg-brand-green text-dark-bg hover:bg-brand-teal transition-colors">
                  Ingresar
                </button>
              )}

              {/* Hamburger (mobile) */}
              <button onClick={()=>setMenuOpen(!menuOpen)}
                className="md:hidden bg-transparent border border-brand-green/30 text-brand-green rounded-lg px-2.5 py-1.5 cursor-pointer text-base hamburger hover:bg-brand-green/10 transition-colors">
                {menuOpen ? '✕' : '☰'}
              </button>
            </div>
          </div>

          {/* Nav desktop */}
          <nav className="hidden md:flex gap-2 flex-wrap nav-desktop">
            {navItems.map(n => (
              <button key={n.key} disabled={n.disabled}
                onClick={() => goTab(n.key)}
                className={`rounded-full px-4 py-2 text-xs font-semibold transition-colors disabled:opacity-30 disabled:cursor-not-allowed ${tab === n.key ? 'bg-brand-green text-dark-bg hover:bg-brand-teal' : 'bg-mid-bg text-text-muted hover:text-white border border-transparent'}`}>
                {n.label}
              </button>
            ))}
          </nav>

          {/* Nav mobile dropdown */}
          {menuOpen && (
            <div style={{ display:'flex', flexDirection:'column', gap:6, paddingTop:10 }} className="nav-mobile">
              {navItems.map(n => (
                <button key={n.key} disabled={n.disabled}
                  onClick={() => goTab(n.key)}
                  style={{ padding:'12px 16px', borderRadius:8, textAlign:'left',
                    background: tab===n.key?'rgba(0,255,151,0.12)':'rgba(255,255,255,0.03)',
                    border: `1px solid ${tab===n.key?'rgba(0,255,151,0.4)':'rgba(255,255,255,0.07)'}`,
                    color: tab===n.key?'#00ff97':'rgba(255,255,255,0.7)',
                    fontFamily:'Audiowide', fontSize:12, textTransform:'uppercase',
                    letterSpacing:1, cursor:'pointer' }}>
                  {n.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </motion.header>

      {/* ── Main ── */}
      <main className="flex-1 w-full max-w-[1200px] mx-auto px-5 py-8">
        {tab === TABS.DASHBOARD && <DashboardView players={players} matches={matches}
                                     tournaments={tournaments} currentUser={currentUser}
                                     userRole={userRole}
                                     onGoTab={goTab} />}
        {tab === TABS.NEWS     && <NewsSection currentUser={currentUser} />}
        {tab === TABS.RANKING  && <RankingView players={players} matches={matches} />}
        {tab === TABS.MATCHES  && <MatchesView players={players} matches={matches}
                                    onAddMatch={addMatch} onDeleteMatch={deleteMatch}
                                    currentUser={currentUser} />}
        {tab === TABS.ADD      && <PlayerForm onAdd={addPlayer} />}
        {tab === TABS.EDIT_STATS && isAdmin && <AdminEditPlayers players={players} onUpdatePlayer={handleUpdatePlayerStats} />}
        {tab === TABS.GALLERY  && <PlayerGallery players={players} onDelete={deletePlayer} />}
        {tab === TABS.COMPARE  && <ComparisonView players={players} />}
        {tab === TABS.TORNEOS  && <TournamentPage savedPlayers={players} tournaments={tournaments} onSave={setTournaments} />}
        {tab === TABS.HISTORIAL && <HistorialView players={players} tournaments={tournaments} matches={matches} />}
        {tab === TABS.TRAININGS && <TrainingsView players={players} currentUser={currentUser} />}
        {tab === TABS.MEDALS      && <MedalsView      players={players} matches={matches} />}
        {tab === TABS.EVALUATIONS && <EvaluationsView players={players} currentUser={currentUser} />}
      </main>

      {/* ── Footer ── */}
      <footer className="border-t border-gray-800 bg-nav-bg mt-auto py-8 px-6 text-center text-text-muted text-xs">
        PETUNIAS OPEN © 2025 · Tennis Player Analysis Platform
      </footer>

      {/* ── Modals ── */}
      {showAuth    && <AuthModal onClose={()=>setShowAuth(false)} onAuth={handleAuth} />}
      {showProfile && currentUser && (
        <ProfileModal user={currentUser} players={players}
          onClose={()=>setShowProfile(false)}
          onUpdate={u=>setCurrentUser(u)}
          onLogout={handleLogout} />
      )}
      {showAdmin && isAdmin && (
        <AdminPanel players={players} tournaments={tournaments}
          onPlayersChange={setPlayers}
          onTournamentsChange={setTournaments}
          onClose={()=>setShowAdmin(false)} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
